<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin-Login · Kreuztaler Werkstatt GmbH</title>
    <link rel="icon" type="image/avif" href="/static/images/kw.avif">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>tailwind.config={theme:{extend:{colors:{'on-primary-fixed':'#001d35','surface-container-lowest':'#ffffff','tertiary-container':'#60676b','secondary':'#52606d','surface-container-low':'#f3f3f6','on-surface':'#1a1c1e','surface':'#f9f9fc','outline-variant':'#c1c7d2','primary':'#005086','primary-container':'#0d69ab','secondary-container':'#d5e4f4','on-primary':'#ffffff','surface-container':'#eeeef0','surface-variant':'#e2e2e5','background':'#f9f9fc','inverse-surface':'#2f3133','outline':'#717881','tertiary':'#484f53','surface-container-highest':'#e2e2e5','on-surface-variant':'#414750','error':'#ba1a1a','on-background':'#1a1c1e','surface-container-high':'#e8e8ea','surface-container-highest':'#e2e2e5'},borderRadius:{'none':'0','sm':'0.125rem',DEFAULT:'0.125rem','md':'0.25rem','lg':'0.25rem','xl':'0.5rem','2xl':'0.75rem','3xl':'1rem','full':'9999px','button':'0.25rem'},fontFamily:{'headline':['Hanken Grotesk','sans-serif'],'body':['Inter','sans-serif'],'mono':['JetBrains Mono','monospace']},spacing:{'gutter':'24px','margin-mobile':'16px','margin-desktop':'64px','container-max':'1280px'}}}}</script>
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet">
    <style>
        html, body { background: #f9f9fc; color: #1a1c1e; }
        body { font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(193,199,210,0.5); box-shadow: 0 8px 32px rgba(0,80,134,0.06); }
        .logo-glow { filter: drop-shadow(0 0 12px rgba(13,105,171,0.25)); }
        .tech-grid { background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,80,134,0.025) 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,80,134,0.025) 40px); }
    </style>
</head>
<body class="min-h-dvh flex items-center justify-center tech-grid">
    <div class="fixed top-0 left-1/4 w-96 h-96 bg-primary-container/10 rounded-full blur-[100px] pointer-events-none" style="z-index:-1"></div>
    <div class="fixed bottom-0 right-0 w-96 h-96 bg-secondary-container/10 rounded-full blur-[120px] pointer-events-none" style="z-index:-1"></div>
    <div class="w-full max-w-sm glass-panel p-8 rounded-xl">
        <div class="flex items-center justify-center mb-6">
            <img src="/static/images/kw.avif" alt="Kreuztaler Werkstatt Logo" class="h-14 mr-2 logo-glow">
            <div>
                <div class="text-xl font-headline font-bold text-primary">Kreuztaler Werkstatt</div>
                <div class="text-xs font-mono text-outline uppercase tracking-wider">Admin-Bereich</div>
            </div>
        </div>
        <form method="POST" action="/admin/login" class="space-y-5">
            <div>
                <label for="password" class="block text-sm font-medium text-on-surface-variant mb-1.5">Passwort</label>
                <input type="password" id="password" name="password" required autofocus class="w-full px-4 py-2.5 text-sm border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary/25 transition-colors" placeholder="••••">
            </div>
            <button type="submit" class="btn-primary w-full py-2.5 font-medium tracking-wide">Anmelden</button>
        </form>
        <div class="text-center mt-5">
            <a href="/" class="text-sm text-outline hover:text-primary transition-colors inline-flex items-center gap-1">
                <span class="material-symbols-outlined" style="font-size:1rem">arrow_back</span>
                Zurück zur Website
            </a>
        </div>
    </div>
</body>
</html>
